name: Selenium UI Tests CI

on:
  push:
    branches:
      - main

#  schedule:
#    # Every day at 07:00 UTC (~08:00 Serbia winter time)
#    - cron: '0 7 * * *'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Maven tests
        run: mvn test